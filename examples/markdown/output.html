<script>const DATA = {"markdown":"# The Long, Slow, Inevitable Death of the PDF\n\nThe PDF is the universal output format. Every report, every spec, every\ncontract, every menu, every receipt eventually becomes one. It is the\ntext-based equivalent of a fax: hated, ubiquitous, immortal.\n\nThis is mostly because nothing better has shown up. Word documents are\nproprietary. Markdown is too plain. HTML is too varied. So the PDF\nendures, like a cockroach with a \"Save As\" button.\n\n## Why PDFs persist\n\nThere are three real reasons:\n\n1. **Faithful rendering.** A PDF looks the same on every device, every\n   printer, every reader. This was a miracle in 1993 and is still useful.\n2. **Portability.** One file, one click, one envelope.\n3. **Print-to-screen consistency.** Even if you never print it, it\n   *implies* a page, which implies a finished thing, which implies trust.\n\nThe first two have alternatives that finally work. The third is harder\nto reason about, but it might be where the PDF actually lives.\n\n## What's broken about it\n\nA PDF is a closed format pretending to be an open one. The text inside\nis often hostile to copy-paste. Tables shatter on selection. Forms are\nhieroglyphics. Search works, but only barely. On a phone, a PDF asks\nyou to *zoom into a thing designed for paper*, which is the digital\nequivalent of being handed a folded map and a compass.\n\n> The PDF is the only format I know of that simultaneously feels like a\n> precious artifact and a hostile environment.\n\n## What might replace it\n\nThe candidates have always existed. They just haven't won.\n\n### HTML\n\nA single self-contained `.html` file can hold structure, color,\nillustrations, code, animation, search, and interactivity. It opens\nin any browser. It does not need an app. It is searchable, copyable,\nmobile-responsive when written correctly, and it is the format that\nagents already produce for the web.\n\nThe downside has always been that authoring was hard. That is what\njust changed.\n\n### Markdown\n\nLighter than HTML, with the same portability. But markdown has no\nvisual identity. A 100-page PDF and a 100-page markdown file feel\nnothing alike. Markdown is a working draft; PDF is a finished thing.\nThis is sociology more than technology.\n\n### Notion / Slabs / Walling / Capacities\n\nBeautiful, but locked. You don't have the file. You have a link, and\nthe link only works while you're paying.\n\n## So what changes now\n\nThe shape of the answer is: **make HTML feel finished**. Authoring used\nto be the bottleneck — a designer to lay out the typography, an engineer\nto wire the interactions. Both of those are now things an agent can do\nin a single prompt.\n\nA PDF says \"this document is final.\" An HTML file produced by an agent\nthat read your specs, your data, your repo, your meeting notes, *and\nturned them into a single file with search, navigation, dark mode and\nmobile responsiveness* says \"this document is alive.\"\n\nThat second one is more useful.\n\n---\n\n## Footnotes\n\n- The single-self-contained-file thing matters. Multi-file SPAs are\n  not portable; you can't email them.\n- Search inside the HTML file is non-negotiable. The number of times\n  per week I `Cmd-F` inside a long document is the reason any reading\n  experience without it feels broken.\n- Mobile responsive is non-negotiable. People will read what you sent\n  on a phone, in a hurry, between meetings. If they can't, they don't.\n\nThe PDF is going to outlive every single one of us. But it shouldn't\nhave to.\n","headings":[{"level":1,"text":"The Long, Slow, Inevitable Death of the PDF"},{"level":2,"text":"Why PDFs persist"},{"level":2,"text":"What's broken about it"},{"level":2,"text":"What might replace it"},{"level":3,"text":"HTML"},{"level":3,"text":"Markdown"},{"level":3,"text":"Notion / Slabs / Walling / Capacities"},{"level":2,"text":"So what changes now"},{"level":2,"text":"Footnotes"}],"sourceFile":"input.md","sizeBytes":3429,"wordCount" (function() {
  // ── Tiny markdown renderer ──────────────────────────────────────────────────
  function renderMarkdown(md) {
    const lines = md.split('\n');
    let html = '';
    let i = 0;
    let inList = null; // 'ul' or 'ol'
    let listBuffer = '';
    let inPre = false;
    let preBuffer = '';
    let preLang = '';

    function flushList() {
      if (inList) {
        html += `<${inList}>${listBuffer}</${inList}>\n`;
        listBuffer = '';
        inList = null;
      }
    }

    function slugify(text) {
      return text.toLowerCase()
        .replace(/[^\w\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .trim();
    }

    function inlineRender(text) {
      // Bold + italic
      text = text.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
      text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/__(.*?)__/g, '<strong>$1</strong>');
      text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
      text = text.replace(/_((?:[^_]|__)*?)_/g, '<em>$1</em>');
      // Inline code
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Links
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
      // Strikethrough
      text = text.replace(/~~(.*?)~~/g, '<del>$1</del>');
      return text;
    }

    while (i < lines.length) {
      const line = lines[i];

      // Code fence
      if (line.startsWith('```')) {
        if (!inPre) {
          flushList();
          inPre = true;
          preLang = line.slice(3).trim();
          preBuffer = '';
          i++;
          continue;
        } else {
          const escaped = preBuffer
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          const langAttr = preLang ? ` data-lang="${preLang}"` : '';
          html += `<pre${langAttr}><code>${escaped}</code></pre>\n`;
          inPre = false;
          preBuffer = '';
          preLang = '';
          i++;
          continue;
        }
      }

      if (inPre) {
        preBuffer += (preBuffer ? '\n' : '') + line;
        i++;
        continue;
      }

      // Headings
      const hMatch = line.match(/^(#{1,6})\s+(.*)/);
      if (hMatch) {
        flushList();
        const level = hMatch[1].length;
        const text = hMatch[2].trim();
        const slug = slugify(text);
        const anchor = `<a class="heading-anchor" href="#${slug}" aria-hidden="true">#</a>`;
        html += `<h${level} id="${slug}">${inlineRender(text)}${anchor}</h${level}>\n`;
        i++;
        continue;
      }

      // HR
      if (line.match(/^[-*_]{3,}\s*$/)) {
        flushList();
        html += '<hr>\n';
        i++;
        continue;
      }

      // Blockquote
      if (line.startsWith('> ')) {
        flushList();
        let bqLines = [];
        while (i < lines.length && lines[i].startsWith('> ')) {
          bqLines.push(lines[i].slice(2));
          i++;
        }
        const inner = bqLines.map(l => `<p>${inlineRender(l)}</p>`).join('');
        html += `<blockquote>${inner}</blockquote>\n`;
        continue;
      }

      // Unordered list
      const ulMatch = line.match(/^(\s*)[-*+]\s+(.*)/);
      if (ulMatch) {
        if (inList !== 'ul') { flushList(); inList = 'ul'; }
        listBuffer += `<li>${inlineRender(ulMatch[2])}</li>\n`;
        i++;
        continue;
      }

      // Ordered list
      const olMatch = line.match(/^\d+\.\s+(.*)/);
      if (olMatch) {
        if (inList !== 'ol') { flushList(); inList = 'ol'; }
        listBuffer += `<li>${inlineRender(olMatch[1])}</li>\n`;
        i++;
        continue;
      }

      // Blank line
      if (line.trim() === '') {
        flushList();
        i++;
        continue;
      }

      // Paragraph accumulation
      flushList();
      let paraLines = [];
      while (i < lines.length && lines[i].trim() !== '' && !lines[i].startsWith('#') && !lines[i].startsWith('> ') && !lines[i].startsWith('```') && !lines[i].match(/^(\s*)[-*+]\s+/) && !lines[i].match(/^\d+\.\s+/) && !lines[i].match(/^[-*_]{3,}\s*$/)) {
        paraLines.push(lines[i]);
        i++;
      }
      if (paraLines.length) {
        html += `<p>${inlineRender(paraLines.join(' '))}</p>\n`;
      } else {
        i++;
      }
    }

    flushList();
    if (inPre) {
      const escaped = preBuffer.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      html += `<pre><code>${escaped}</code></pre>\n`;
    }

    return html;
  }

  // ── Bootstrap ───────────────────────────────────────────────────────────────
  const data = DATA;
  const md = data.markdown || '';
  const wordCount = data.wordCount || 0;
  const headings = data.headings || [];
  const sourceFile = (data.meta && data.meta.sourceFile) || data.sourceFile || '';
  const sizeBytes = (data.meta && data.meta.sizeBytes) || data.sizeBytes || 0;

  // Header
  const titleEl = document.getElementById('page-title');
  const docTitle = (headings[0] && headings[0].text) || 'Document';
  titleEl.textContent = docTitle;
  document.title = docTitle;

  const readingMins = Math.max(1, Math.round(wordCount / 200));
  document.getElementById('reading-time').textContent = `${readingMins} min read`;
  document.getElementById('word-count').textContent = `${wordCount.toLocaleString()} words`;
  document.getElementById('source-file').textContent = sourceFile;
  document.getElementById('footer-info').textContent =
    `${sourceFile} · ${(sizeBytes / 1024).toFixed(1)} KB · ${wordCount} words`;

  // Render
  const articleEl = document.getElementById('article-content');
  articleEl.innerHTML = renderMarkdown(md);

  // ── TOC ─────────────────────────────────────────────────────────────────────
  function buildTOC(listId) {
    const ul = document.getElementById(listId);
    if (!ul) return;
    headings.forEach(h => {
      if (h.level > 3) return;
      const slug = h.text.toLowerCase().replace(/[^\w\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').trim();
      const li = document.createElement('li');
      li.className = h.level === 3 ? 'toc-h3' : `toc-h${h.level}`;
      const a = document.createElement('a');
      a.href = `#${slug}`;
      a.textContent = h.text;
      a.addEventListener('click', e => {
        if (window.innerWidth < 900) {
          document.getElementById('toc-mobile-list').classList.remove('open');
          document.getElementById('toc-toggle').classList.remove('open');
          document.getElementById('toc-toggle').setAttribute('aria-expanded','false');
        }
      });
      li.appendChild(a);
      ul.appendChild(li);
    });
  }

  buildTOC('toc-list-desktop');
  buildTOC('toc-list-mobile');

  // Mobile TOC toggle
  document.getElementById('toc-toggle').addEventListener('click', function() {
    const list = document.getElementById('toc-mobile-list');
    const open = list.classList.toggle('open');
    this.classList.toggle('open', open);
    this.setAttribute('aria-expanded', String(open));
  });

  // ── Active TOC on scroll ─────────────────────────────────────────────────────
  const headingEls = articleEl.querySelectorAll('h1,h2,h3,h4,h5,h6');
  function updateActiveTOC() {
    let current = null;
    headingEls.forEach(el => {
      if (el.getBoundingClientRect().top < 120) current = el.id;
    });
    document.querySelectorAll('.toc-list a').forEach(a => {
      const active = a.getAttribute('href') === `#${current}`;
      a.classList.toggle('active', active);
    });
  }
  window.addEventListener('scroll', updateActiveTOC, { passive: true });
  updateActiveTOC();

  // ── Search ───────────────────────────────────────────────────────────────────
  const searchInput = document.getElementById('search-input');
  const searchCount = document.getElementById('search-count');
  const noResults = document.getElementById('no-results');
  let currentMatchIdx = 0;
  let allMatches = [];

  function escapeRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function clearHighlights() {
    articleEl.querySelectorAll('mark.search-hl').forEach(m => {
      const parent = m.parentNode;
      parent.replaceChild(document.createTextNode(m.textContent), m);
      parent.normalize();
    });
    allMatches = [];
    currentMatchIdx = 0;
  }

  function highlightInNode(node, regex) {
    if (node.nodeType === 3) {
      const text = node.textContent;
      let m;
      let lastIdx = 0;
      const frag = document.createDocumentFragment();
      regex.lastIndex = 0;
      while ((m = regex.exec(text)) !== null) {
        if (m.index > lastIdx) frag.appendChild(document.createTextNode(text.slice(lastIdx, m.index)));
        const mark = document.createElement('mark');
        mark.className = 'search-hl';
        mark.textContent = m[0];
        frag.appendChild(mark);
        allMatches.push(mark);
        lastIdx = regex.lastIndex;
      }
      if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.slice(lastIdx)));
      if (allMatches.length > 0 || frag.childNodes.length > 1) {
        node.parentNode.replaceChild(frag, node);
      }
    } else if (node.nodeType === 1 && node.nodeName !== 'MARK' && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
      Array.from(node.childNodes).forEach(child => highlightInNode(child, regex));
    }
  }

  function doSearch(query) {
    clearHighlights();
    if (!query.trim()) {
      searchCount.textContent = '';
      noResults.style.display = 'none';
      articleEl.style.display = '';
      return;
    }
    const regex = new RegExp(escapeRegex(query), 'gi');
    highlightInNode(articleEl, regex);

    if (allMatches.length === 0) {
      searchCount.textContent = '0 results';
      noResults.style.display = 'block';
    } else {
      noResults.style.display = 'none';
      currentMatchIdx = 0;
      allMatches[0].classList.add('current');
      allMatches[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
      searchCount.textContent = `1 / ${allMatches.length}`;
    }
  }

  let searchTimer;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doSearch(searchInput.value), 120);
  });

  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && allMatches.length > 0) {
      allMatches[currentMatchIdx].classList.remove('current');
      currentMatchIdx = e.shiftKey
        ? (currentMatchIdx - 1 + allMatches.length) % allMatches.length
        : (currentMatchIdx + 1) % allMatches.length;
      allMatches[currentMatchIdx].classList.add('current');
      allMatches[currentMatchIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
      searchCount.textContent = `${currentMatchIdx + 1} / ${allMatches.length}`;
      e.preventDefault();
    }
    if (e.key === 'Escape') {
      searchInput.value = '';
      doSearch('');
    }
  });

  // Keyboard shortcut: / or Ctrl+F-ish (just / for focus)
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== searchInput) {
      e.preventDefault();
      searchInput.focus();
    }
  });

  // ── Copy Markdown ────────────────────────────────────────────────────────────
  document.getElementById('copy-md-btn').addEventListener('click', async function() {
    try {
      await navigator.clipboard.writeText(md);
      this.textContent = '✓ Copied!';
      this.classList.add('copied');
      setTimeout(() => {
        this.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Markdown`;
        this.classList.remove('copied');
      }, 2000);
    } catch(e) {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = md;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      this.textContent = '✓ Copied!';
      this.classList.add('copied');
      setTimeout(() => {
        this.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2 2v1"/></svg> Copy Markdown`;
        this.classList.remove('copied');
      }, 2000);
    }
  });

})();
</script>
</body>
</html>
