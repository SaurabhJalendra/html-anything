<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Equipment Sales — January 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f8f8f7;
  --surface:#ffffff;
  --border:#e2e2df;
  --border2:#d0d0cc;
  --text:#1a1a18;
  --text2:#5a5a55;
  --text3:#8a8a84;
  --accent:#2563eb;
  --accent-bg:#eff4ff;
  --num:#0f4c8a;
  --hover:#f2f2ef;
  --sort-active:#2563eb;
  --th-bg:#f2f2ef;
  --th-text:#3a3a36;
  --stripe:#fafaf8;
  --tag-bg:#eeeeea;
  --tag-text:#4a4a46;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --bar-1:#3b82f6;
  --bar-2:#10b981;
  --bar-3:#f59e0b;
  --bar-4:#ef4444;
  --bar-5:#8b5cf6;
}

@media(prefers-color-scheme:dark){
  :root{
    --bg:#111110;
    --surface:#1c1c1a;
    --border:#2e2e2a;
    --border2:#3e3e3a;
    --text:#e8e8e4;
    --text2:#a0a09a;
    --text3:#606058;
    --accent:#60a5fa;
    --accent-bg:#1e2d47;
    --num:#93c5fd;
    --hover:#252522;
    --sort-active:#60a5fa;
    --th-bg:#222220;
    --th-text:#b0b0a8;
    --stripe:#1e1e1c;
    --tag-bg:#2a2a28;
    --tag-text:#b0b0a8;
    --shadow:0 1px 3px rgba(0,0,0,.3);
    --bar-1:#3b82f6;
    --bar-2:#10b981;
    --bar-3:#f59e0b;
    --bar-4:#ef4444;
    --bar-5:#8b5cf6;
  }
}

html{font-size:14px;-webkit-font-smoothing:antialiased}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  line-height:1.5;
}

/* ── Layout ── */
.page{max-width:1280px;margin:0 auto;padding:16px 12px 48px}

/* ── Header ── */
.page-header{margin-bottom:20px}
.page-title{font-size:1.25rem;font-weight:600;letter-spacing:-.01em;line-height:1.3}
.page-sub{color:var(--text2);font-size:.8rem;margin-top:2px}

/* ── Summary cards ── */
.summary-row{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
  margin-bottom:20px;
}
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px 14px;
  box-shadow:var(--shadow);
}
.card-label{font-size:.7rem;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.card-value{font-size:1.35rem;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text);font-family:'Inter',monospace}
.card-sub{font-size:.7rem;color:var(--text2);margin-top:2px}

/* ── Chart section ── */
.charts-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:20px;
}
@media(max-width:600px){.charts-row{grid-template-columns:1fr}}
.chart-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px;
  box-shadow:var(--shadow);
}
.chart-title{font-size:.75rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
canvas{display:block;width:100%!important}

/* ── Toolbar ── */
.toolbar{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
  flex-wrap:wrap;
}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap svg{
  position:absolute;left:9px;top:50%;transform:translateY(-50%);
  color:var(--text3);pointer-events:none;
}
#searchInput{
  width:100%;
  padding:6px 8px 6px 30px;
  border:1px solid var(--border2);
  border-radius:6px;
  background:var(--surface);
  color:var(--text);
  font-size:.82rem;
  font-family:inherit;
  outline:none;
  transition:border-color .15s;
}
#searchInput:focus{border-color:var(--accent)}
#searchInput::placeholder{color:var(--text3)}

.row-status{font-size:.75rem;color:var(--text2);white-space:nowrap}
.row-status span{font-weight:600;color:var(--text)}

.btn{
  padding:5px 10px;
  border:1px solid var(--border2);
  border-radius:6px;
  background:var(--surface);
  color:var(--text2);
  font-size:.75rem;
  font-family:inherit;
  cursor:pointer;
  white-space:nowrap;
  transition:background .12s,color .12s;
}
.btn:hover{background:var(--hover);color:var(--text)}
.btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}

/* ── Table wrapper ── */
.table-wrap{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

table{
  width:100%;
  border-collapse:collapse;
  font-size:.8rem;
}

thead{position:sticky;top:0;z-index:10}
th{
  background:var(--th-bg);
  color:var(--th-text);
  font-weight:600;
  font-size:.72rem;
  text-transform:uppercase;
  letter-spacing:.04em;
  padding:9px 10px;
  text-align:left;
  border-bottom:1px solid var(--border2);
  white-space:nowrap;
  cursor:pointer;
  user-select:none;
  position:relative;
}
th:hover{color:var(--text)}
th.num{text-align:right}
th .sort-icon{
  display:inline-block;
  margin-left:4px;
  opacity:.3;
  font-size:.65rem;
  vertical-align:middle;
}
th.sorted .sort-icon{opacity:1;color:var(--sort-active)}

td{
  padding:7px 10px;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
  white-space:nowrap;
  max-width:160px;
  overflow:hidden;
  text-overflow:ellipsis;
}
td.num{
  text-align:right;
  font-variant-numeric:tabular-nums;
  font-family:'Inter',monospace;
  color:var(--num);
}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:var(--stripe)}
tr:hover td{background:var(--hover)}

td.order-id{font-family:monospace;font-size:.75rem;color:var(--text2)}
td.date-cell{color:var(--text2);font-family:monospace;font-size:.75rem}

.region-tag{
  display:inline-block;
  padding:2px 7px;
  border-radius:10px;
  font-size:.68rem;
  font-weight:500;
  background:var(--tag-bg);
  color:var(--tag-text);
}
.region-West{background:#dbeafe;color:#1e40af}
.region-East{background:#dcfce7;color:#166534}
.region-Central{background:#fef3c7;color:#92400e}
.region-North{background:#f3e8ff;color:#6b21a8}
.region-South{background:#ffe4e6;color:#9f1239}
@media(prefers-color-scheme:dark){
  .region-West{background:#1e3a5f;color:#93c5fd}
  .region-East{background:#14432a;color:#6ee7b7}
  .region-Central{background:#451a03;color:#fcd34d}
  .region-North{background:#2e1065;color:#d8b4fe}
  .region-South{background:#4c0519;color:#fda4af}
}

.highlight{background:rgba(37,99,235,.18);border-radius:2px;padding:0 1px}
@media(prefers-color-scheme:dark){.highlight{background:rgba(96,165,250,.25)}}

.no-rows{
  padding:32px;
  text-align:center;
  color:var(--text3);
  font-size:.82rem;
}

/* copy button in toolbar */
.copy-btn{
  padding:5px 10px;
  border:1px solid var(--border2);
  border-radius:6px;
  background:var(--surface);
  color:var(--text2);
  font-size:.75rem;
  font-family:inherit;
  cursor:pointer;
  transition:background .12s,color .12s;
  white-space:nowrap;
}
.copy-btn:hover{background:var(--hover);color:var(--text)}
.copy-btn.copied{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}

/* tooltip for truncated cells */
td[title]{cursor:default}
</style>
</head>

</div>

,"35","79.00","2765.00","Sam Reyes"]],"sourceFile":"input.csv","sizeBytes":3243,"rowCount":46,"columnCount":8,"headers":["order_id","date","region","product","units","unit_price","revenue","sales_rep"],"numericColumns":["units","unit_price","revenue"],"separator":","};</script>
<script>
(function(){
  const NUMERIC = new Set(DATA.numericColumns);
  const HEADERS = DATA.headers;
  const ROWS = DATA.rows;

  // ── Helpers ──────────────────────────────────────────────────────────────
  function isNum(col){return NUMERIC.has(col)}
  function fmtNum(v){
    const n=parseFloat(v);
    if(isNaN(n))return v;
    return n.toLocaleString('en-US',{minimumFractionDigits: v.includes('.')?2:0, maximumFractionDigits:2});
  }
  function fmtCurrency(n){
    return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  }
  function colIdx(name){return HEADERS.indexOf(name)}

  // ── Summary stats ─────────────────────────────────────────────────────────
  const idxUnits   = colIdx('units');
  const idxPrice   = colIdx('unit_price');
  const idxRev     = colIdx('revenue');
  const idxRegion  = colIdx('region');
  const idxProduct = colIdx('product');
  const idxRep     = colIdx('sales_rep');
  const idxDate    = colIdx('date');

  let totalRev=0, totalUnits=0, maxRev=-Infinity, minRev=Infinity;
  const regions=new Set(), products=new Set(), reps=new Set();
  ROWS.forEach(r=>{
    const rev=parseFloat(r[idxRev])||0;
    const units=parseFloat(r[idxUnits])||0;
    totalRev+=rev; totalUnits+=units;
    if(rev>maxRev)maxRev=rev;
    if(rev<minRev)minRev=rev;
    regions.add(r[idxRegion]);
    products.add(r[idxProduct]);
    reps.add(r[idxRep]);
  });
  const avgRev=totalRev/ROWS.length;

  // page subtitle
  document.getElementById('pageSub').textContent =
    `${ROWS.length} orders · ${regions.size} regions · ${products.size} products · ${reps.size} sales reps · ${DATA.meta?.sourceFile||'input.csv'}`;

  // cards
  const cards=[
    {label:'Total Revenue',value:fmtCurrency(totalRev),sub:'all orders'},
    {label:'Total Units',value:totalUnits.toLocaleString(),sub:'units sold'},
    {label:'Orders',value:ROWS.length,sub:'in January 2026'},
    {label:'Avg Order Rev',value:fmtCurrency(avgRev),sub:'per order'},
    {label:'Regions',value:regions.size,sub:[...regions].join(', ')},
    {label:'Products',value:products.size,sub:[...products].join(', ')},
    {label:'Sales Reps',value:reps.size,sub:[...reps].join(', ')},
  ];
  const summaryRow=document.getElementById('summaryRow');
  cards.forEach(c=>{
    const d=document.createElement('div');
    d.className='card';
    d.innerHTML=`<div class="card-label">${c.label}</div><div class="card-value">${c.value}</div><div class="card-sub" title="${c.sub}">${c.sub.length>30?c.sub.slice(0,28)+'…':c.sub}</div>`;
    summaryRow.appendChild(d);
  });

  // ── Charts (Canvas) ────────────────────────────────────────────────────────
  function isDark(){return window.matchMedia('(prefers-color-scheme:dark)').matches}

  function drawHBar(canvasId, labels, values, colors){
    const canvas=document.getElementById(canvasId);
    const dpr=window.devicePixelRatio||1;
    const W=canvas.parentElement.clientWidth-28;
    const barH=22, gap=6, padLeft=110, padRight=60, padTop=8, padBottom=8;
    const H=padTop+(barH+gap)*labels.length+padBottom;
    canvas.width=W*dpr; canvas.height=H*dpr;
    canvas.style.width=W+'px'; canvas.style.height=H+'px';
    const ctx=canvas.getContext('2d');
    ctx.scale(dpr,dpr);
    const dark=isDark();
    const textCol=dark?'#a0a09a':'#5a5a55';
    const valCol=dark?'#93c5fd':'#1e40af';
    const maxVal=Math.max(...values);
    const availW=W-padLeft-padRight;
    labels.forEach((lbl,i)=>{
      const y=padTop+i*(barH+gap);
      // label
      ctx.fillStyle=textCol;
      ctx.font='11px Inter,system-ui,sans-serif';
      ctx.textAlign='right';
      ctx.textBaseline='middle';
      const shortLbl=lbl.length>14?lbl.slice(0,13)+'…':lbl;
      ctx.fillText(shortLbl,padLeft-6,y+barH/2);
      // bar
      const bw=Math.max(2,(values[i]/maxVal)*availW);
      ctx.fillStyle=colors[i%colors.length];
      ctx.beginPath();
      ctx.roundRect(padLeft,y,bw,barH,3);
      ctx.fill();
      // value
      ctx.fillStyle=valCol;
      ctx.font='600 10px Inter,monospace';
      ctx.textAlign='left';
      ctx.textBaseline='middle';
      ctx.fillText('$'+Math.round(values[i]).toLocaleString(),padLeft+bw+5,y+barH/2);
    });
  }

  function buildCharts(){
    // Revenue by product
    const prodMap={};
    ROWS.forEach(r=>{
      const p=r[idxProduct]; const v=parseFloat(r[idxRev])||0;
      prodMap[p]=(prodMap[p]||0)+v;
    });
    const prodEntries=Object.entries(prodMap).sort((a,b)=>b[1]-a[1]);
    const COLORS=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4'];
    drawHBar('chartProduct',prodEntries.map(e=>e[0]),prodEntries.map(e=>e[1]),COLORS);

    // Revenue by region
    const regMap={};
    ROWS.forEach(r=>{
      const rg=r[idxRegion]; const v=parseFloat(r[idxRev])||0;
      regMap[rg]=(regMap[rg]||0)+v;
    });
    const regEntries=Object.entries(regMap).sort((a,b)=>b[1]-a[1]);
    drawHBar('chartRegion',regEntries.map(e=>e[0]),regEntries.map(e=>e[1]),['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6']);
  }
  buildCharts();
  window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',buildCharts);
  window.addEventListener('resize',buildCharts);

  // ── Table ────────────────────────────────────────────────────────────────
  let sortCol=-1, sortDir=1, filterText='';
  let filteredRows=[...ROWS];

  // Build header
  const thead=document.getElementById('thead');
  const trh=document.createElement('tr');
  HEADERS.forEach((h,i)=>{
    const th=document.createElement('th');
    th.className=isNum(h)?'num':'';
    th.innerHTML=`${h.replace(/_/g,' ')}<span class="sort-icon">⬍</span>`;
    th.dataset.col=i;
    th.addEventListener('click',()=>handleSort(i));
    trh.appendChild(th);
  });
  thead.appendChild(trh);

  function handleSort(i){
    if(sortCol===i){sortDir*=-1}else{sortCol=i;sortDir=1}
    renderTable();
  }

  function getCell(row,i){return row[i]??''}

  function sortRows(rows){
    if(sortCol<0)return rows;
    const h=HEADERS[sortCol];
    const numeric=isNum(h);
    return [...rows].sort((a,b)=>{
      let av=getCell(a,sortCol), bv=getCell(b,sortCol);
      if(numeric){av=parseFloat(av)||0;bv=parseFloat(bv)||0;return sortDir*(av-bv)}
      return sortDir*av.localeCompare(bv,undefined,{sensitivity:'base'});
    });
  }

  function escapeHtml(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function highlight(text, q){
    if(!q)return escapeHtml(text);
    const escaped=escapeHtml(text);
    const qe=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    return escaped.replace(new RegExp(`(${qe})`,'gi'),'<mark class="highlight">$1</mark>');
  }

  function renderTable(){
    const tbody=document.getElementById('tbody');
    const q=filterText.trim().toLowerCase();

    // filter
    filteredRows=q
      ? ROWS.filter(r=>r.some(c=>String(c).toLowerCase().includes(q)))
      : [...ROWS];

    // sort
    const sorted=sortRows(filteredRows);

    // update sort icons
    document.querySelectorAll('#thead th').forEach((th,i)=>{
      th.classList.toggle('sorted',i===sortCol);
      const ic=th.querySelector('.sort-icon');
      if(ic){
        if(i===sortCol) ic.textContent=sortDir===1?'↑':'↓';
        else ic.textContent='⬍';
      }
    });

    // build rows
    const frag=document.createDocumentFragment();
    if(sorted.length===0){
      const tr=document.createElement('tr');
      const td=document.createElement('td');
      td.colSpan=HEADERS.length;
      td.className='no-rows';
      td.textContent='No rows match your search.';
      tr.appendChild(td); frag.appendChild(tr);
    } else {
      sorted.forEach(row=>{
        const tr=document.createElement('tr');
        HEADERS.forEach((h,i)=>{
          const td=document.createElement('td');
          const raw=row[i]??'';
          if(h==='order_id'){
            td.className='order-id';
            td.innerHTML=highlight(raw,q);
          } else if(h==='date'){
            td.className='date-cell';
            td.innerHTML=highlight(raw,q);
          } else if(h==='region'){
            const tag=document.createElement('span');
            tag.className=`region-tag region-${raw}`;
            tag.innerHTML=highlight(raw,q);
            td.appendChild(tag);
          } else if(isNum(h)){
            td.className='num';
            const n=parseFloat(raw);
            const disp=isNaN(n)?raw:(h==='unit_price'||h==='revenue')?fmtCurrency(n):fmtNum(raw);
            td.innerHTML=highlight(disp.replace('$','$ ').trim(),q).replace('$ ','$');
            // re-highlight with $ prefix approach — simpler:
            td.textContent='';
            if(q && disp.toLowerCase().includes(q)){
              td.innerHTML=highlight(disp,q);
            } else {
              td.textContent=disp;
            }
          } else {
            td.innerHTML=highlight(raw,q);
          }
          // tooltip for all cells
          td.title=raw;
          tr.appendChild(td);
        });
        frag.appendChild(tr);
      });
    }
    tbody.innerHTML='';
    tbody.appendChild(frag);

    // status
    const status=document.getElementById('rowStatus');
    if(q){
      status.innerHTML=`<span>${sorted.length}</span> of <span>${ROWS.length}</span> rows`;
    } else {
      status.innerHTML=`<span>${ROWS.length}</span> rows`;
    }
  }

  // Search
  const searchInput=document.getElementById('searchInput');
  searchInput.addEventListener('input',()=>{
    filterText=searchInput.value;
    renderTable();
  });

  // Copy CSV
  document.getElementById('copyBtn').addEventListener('click',function(){
    const rows=filterText.trim()
      ? filteredRows
      : ROWS;
    const lines=[HEADERS.join(',')];
    rows.forEach(r=>lines.push(r.map(c=>c.includes(',')||c.includes('"')?`"${c.replace(/"/g,'""')}"`:c).join(',')));
    navigator.clipboard.writeText(lines.join('\n')).then(()=>{
      this.textContent='Copied!';
      this.classList.add('copied');
      setTimeout(()=>{this.textContent='Copy CSV';this.classList.remove('copied')},1800);
    }).catch(()=>{
      const ta=document.createElement('textarea');
      ta.value=lines.join('\n');
      ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      this.textContent='Copied!';
      this.classList.add('copied');
      setTimeout(()=>{this.textContent='Copy CSV';this.classList.remove('copied')},1800);
    });
  });

  renderTable();
})();
</script>
</body>
</html>
