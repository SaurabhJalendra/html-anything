<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex &amp; Mira</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --header-bg: #075e54;
    --header-text: #ffffff;
    --divider-bg: #e1e8ed;
    --divider-text: #667781;
    --msg-alex-bg: #ffffff;
    --msg-alex-text: #111b21;
    --msg-mira-bg: #d9fdd3;
    --msg-mira-text: #111b21;
    --time-color: #667781;
    --sender-alex: #075e54;
    --sender-mira: #128c7e;
    --chip-active-alex: #075e54;
    --chip-active-mira: #128c7e;
    --chip-inactive: #e0e0e0;
    --chip-inactive-text: #555;
    --search-bg: #f0f2f5;
    --search-border: #d0d7de;
    --search-focus: #075e54;
    --stats-bg: #f8faf8;
    --stats-border: #d0e8d0;
    --shadow: 0 1px 2px rgba(0,0,0,0.12);
    --shadow-md: 0 2px 8px rgba(0,0,0,0.10);
    --radius: 8px;
    --radius-msg: 12px;
    --font: 'Inter', system-ui, sans-serif;
    --media-bg: #c8e6c9;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b141a;
      --surface: #1f2c34;
      --header-bg: #1f2c34;
      --header-text: #e9edef;
      --divider-bg: #182229;
      --divider-text: #8696a0;
      --msg-alex-bg: #1f2c34;
      --msg-alex-text: #e9edef;
      --msg-mira-bg: #005c4b;
      --msg-mira-text: #e9edef;
      --time-color: #8696a0;
      --sender-alex: #00a884;
      --sender-mira: #00a884;
      --chip-active-alex: #00a884;
      --chip-active-mira: #00a884;
      --chip-inactive: #2a3942;
      --chip-inactive-text: #8696a0;
      --search-bg: #2a3942;
      --search-border: #3b4a54;
      --search-focus: #00a884;
      --stats-bg: #182229;
      --stats-border: #2a3942;
      --shadow: 0 1px 2px rgba(0,0,0,0.4);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.35);
      --media-bg: #1a3a2a;
    }
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--bg);
    color: var(--msg-alex-text);
    font-size: 15px;
    line-height: 1.5;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 700px;
    margin: 0 auto;
    background: var(--bg);
    position: relative;
  }

  /* HEADER */
  .header {
    background: var(--header-bg);
    color: var(--header-text);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-md);
    flex-shrink: 0;
  }

  .header-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .header-info { flex: 1; min-width: 0; }
  .header-title { font-weight: 600; font-size: 16px; }
  .header-sub { font-size: 12px; opacity: 0.75; margin-top: 1px; }

  .header-btn {
    background: none;
    border: none;
    color: var(--header-text);
    cursor: pointer;
    padding: 6px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.85;
    transition: opacity 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .header-btn:hover { opacity: 1; background: rgba(255,255,255,0.1); }
  .header-btn svg { width: 20px; height: 20px; }

  /* SEARCH BAR */
  .search-bar {
    background: var(--header-bg);
    padding: 0 12px 10px;
    display: none;
    flex-shrink: 0;
  }
  .search-bar.open { display: block; }

  .search-inner {
    display: flex;
    align-items: center;
    background: var(--search-bg);
    border: 1px solid var(--search-border);
    border-radius: 24px;
    padding: 6px 14px;
    gap: 8px;
  }

  .search-inner input {
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
    font-family: var(--font);
    font-size: 14px;
    color: var(--msg-alex-text);
  }
  .search-inner input::placeholder { color: var(--time-color); }

  .search-count {
    font-size: 12px;
    color: var(--time-color);
    white-space: nowrap;
  }

  .search-clear {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--time-color);
    padding: 0;
    display: flex;
    align-items: center;
  }

  /* FILTER CHIPS */
  .filter-row {
    display: flex;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--divider-bg);
    flex-shrink: 0;
    flex-wrap: wrap;
    align-items: center;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .chip-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .chip.active-alex {
    background: var(--chip-active-alex);
    color: #fff;
  }
  .chip.active-mira {
    background: var(--chip-active-mira);
    color: #fff;
  }
  .chip.inactive {
    background: var(--chip-inactive);
    color: var(--chip-inactive-text);
  }

  .chip-spacer { flex: 1; }

  .stats-toggle {
    font-size: 12px;
    color: var(--time-color);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .stats-toggle:hover { background: var(--divider-bg); }

  /* STATS PANEL */
  .stats-panel {
    background: var(--stats-bg);
    border-bottom: 1px solid var(--stats-border);
    padding: 14px 16px;
    display: none;
    flex-shrink: 0;
  }
  .stats-panel.open { display: block; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 10px 12px;
    box-shadow: var(--shadow);
  }

  .stat-label {
    font-size: 11px;
    color: var(--time-color);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    font-weight: 500;
  }

  .stat-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--msg-alex-text);
  }

  .stat-sub {
    font-size: 12px;
    color: var(--time-color);
    margin-top: 2px;
  }

  .stats-sender-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
    font-size: 13px;
  }

  .stats-sender-name { font-weight: 500; min-width: 90px; }
  .stats-bar-wrap { flex: 1; background: var(--divider-bg); border-radius: 4px; height: 8px; overflow: hidden; }
  .stats-bar { height: 100%; border-radius: 4px; transition: width 0.4s; }
  .stats-bar-alex { background: var(--chip-active-alex); }
  .stats-bar-mira { background: var(--chip-active-mira); }
  .stats-count { font-size: 12px; color: var(--time-color); min-width: 30px; text-align: right; }

  /* MESSAGES AREA */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 8px 8px 16px;
    scroll-behavior: smooth;
  }

  /* DATE DIVIDER */
  .date-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 0 6px;
  }

  .date-divider-label {
    background: rgba(225,232,237,0.9);
    color: var(--divider-text);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 8px;
    box-shadow: var(--shadow);
  }

  @media (prefers-color-scheme: dark) {
    .date-divider-label {
      background: rgba(40,55,65,0.9);
    }
  }

  /* MESSAGE ROW */
  .msg-row {
    display: flex;
    margin-bottom: 2px;
    padding: 1px 4px;
  }

  .msg-row.alex { justify-content: flex-start; }
  .msg-row.mira { justify-content: flex-end; }

  .msg-row.msg-hidden { display: none; }

  .msg-bubble-wrap {
    max-width: 75%;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  @media (max-width: 480px) {
    .msg-bubble-wrap { max-width: 88%; }
  }

  .msg-bubble {
    padding: 7px 10px 6px;
    border-radius: var(--radius-msg);
    box-shadow: var(--shadow);
    position: relative;
    word-break: break-word;
    transition: background 0.2s;
  }

  .msg-row.alex .msg-bubble {
    background: var(--msg-alex-bg);
    color: var(--msg-alex-text);
    border-top-left-radius: 2px;
  }

  .msg-row.mira .msg-bubble {
    background: var(--msg-mira-bg);
    color: var(--msg-mira-text);
    border-top-right-radius: 2px;
  }

  .msg-bubble.highlighted {
    outline: 2px solid #f59e0b;
    outline-offset: 1px;
  }

  .msg-text {
    font-size: 14.5px;
    line-height: 1.55;
    white-space: pre-wrap;
  }

  .msg-text mark {
    background: #fde68a;
    color: #7c2d12;
    border-radius: 2px;
    padding: 0 1px;
  }

  @media (prefers-color-scheme: dark) {
    .msg-text mark {
      background: #78350f;
      color: #fde68a;
    }
  }

  .msg-meta {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 4px;
    margin-top: 2px;
  }

  .msg-time {
    font-size: 11px;
    color: var(--time-color);
    white-space: nowrap;
  }

  .msg-media {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--media-bg);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
    color: var(--time-color);
    font-style: italic;
  }

  /* COPY BUTTON (appears on hover) */
  .copy-btn {
    position: absolute;
    top: 4px;
    opacity: 0;
    background: var(--surface);
    border: 1px solid var(--divider-bg);
    border-radius: 6px;
    padding: 3px 6px;
    cursor: pointer;
    font-size: 11px;
    color: var(--time-color);
    display: flex;
    align-items: center;
    gap: 3px;
    transition: opacity 0.15s, background 0.15s;
    pointer-events: none;
    z-index: 10;
    box-shadow: var(--shadow);
    white-space: nowrap;
  }

  .msg-row.alex .copy-btn { right: -6px; transform: translateX(100%); }
  .msg-row.mira .copy-btn { left: -6px; transform: translateX(-100%); }

  .msg-bubble-wrap:hover .copy-btn {
    opacity: 1;
    pointer-events: all;
  }

  .copy-btn:hover { background: var(--divider-bg); }
  .copy-btn.copied { color: #22c55e; }

  /* CONSECUTIVE MESSAGES */
  .msg-row.consecutive .msg-bubble {
    margin-top: 1px;
  }
  .msg-row.consecutive.alex .msg-bubble { border-top-left-radius: var(--radius-msg); }
  .msg-row.consecutive.mira .msg-bubble { border-top-right-radius: var(--radius-msg); }

  /* SCROLL TO BOTTOM */
  .scroll-btn {
    position: absolute;
    bottom: 20px;
    right: 16px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--divider-bg);
    box-shadow: var(--shadow-md);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--time-color);
    z-index: 50;
    transition: opacity 0.2s;
    opacity: 0;
    pointer-events: none;
  }
  .scroll-btn.visible {
    opacity: 1;
    pointer-events: all;
  }

  /* EMPTY STATE */
  .no-results {
    text-align: center;
    padding: 48px 24px;
    color: var(--time-color);
    font-size: 14px;
    display: none;
  }
  .no-results.visible { display: block; }
  .no-results-icon { font-size: 40px; margin-bottom: 10px; }

  /* SCROLLBAR */
  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--divider-bg); border-radius: 4px; }
</style>
</head>

<div class="app" id="app">
  <!-- HEADER -->

    </div>
    <button class="header-btn" id="search-toggle-btn" title="Search (Ctrl+F)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>

  <!-- SEARCH BAR -->
  <div class="search-bar" id="search-bar">
    <div class="search-inner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;opacity:0.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search messages…" autocomplete="off" spellcheck="false">
      <span class="search-count" id="search-count"></span>
      <button class="search-clear" id="search-clear" title="Clear">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">

  </div>

  <!-- FILTER ROW -->
  <div class="filter-row" id="filter-row">
    <!-- chips injected by JS -->

    <button class="stats-toggle" id="stats-toggle">📊 Stats</button>

  <!-- STATS PANEL -->
  <div class="stats-panel" id="stats-panel">

    <div id="stats-senders"></div>
  </div>

  <!-- MESSAGES -->
  <div class="messages-area" id="messages-area">

      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>
</div>

<script>
(function() {
  // ── helpers ───────────────────────────────────────────────────
  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function formatDate(dateStr) {
    try {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString(undefined, { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    } catch(e) { return dateStr; }
  }

  function formatTime(timeStr) {
    try {
      const [h, m] = timeStr.split(':');
      const hour = parseInt(h, 10);
      const ampm = hour >= 12 ? 'PM' : 'AM';
      const h12 = hour % 12 || 12;
      return `${h12}:${m} ${ampm}`;
    } catch(e) { return timeStr; }
  }

  function friendlyDate(dateStr) {
    try {
      const d = new Date(dateStr + 'T00:00:00');
      const today = new Date(); today.setHours(0,0,0,0);
      const diff = (today - d) / 86400000;
      if (diff < 1) return 'Today';
      if (diff < 2) return 'Yesterday';
      return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year: d.getFullYear() !== today.getFullYear() ? 'numeric' : undefined });
    } catch(e) { return dateStr; }
  }

  // ── init ──────────────────────────────────────────────────────
  const messages = DATA.messages || [];
  const senders = DATA.senders || [];
  const messagesPerSender = DATA.messagesPerSender || {};
  const totalMessages = DATA.messageCount || messages.length;
  const dateRange = DATA.dateRange || '';

  // Assign roles
  const SENDER_A = senders[0] || '';
  const SENDER_B = senders[1] || '';

  function senderClass(s) { return s === SENDER_A ? 'alex' : 'mira'; }
  function senderInitial(s) { return s ? s.charAt(0).toUpperCase() : '?'; }

  // State
  let activeFilters = new Set(senders);
  let searchQuery = '';
  let searchResults = []; // indices into messages
  let searchIdx = 0;

  // ── header ───────────────────────────────────────────────────
  document.getElementById('header-title').textContent = `${SENDER_A} & ${SENDER_B}`;
  document.getElementById('header-sub').textContent = `${totalMessages} messages · ${dateRange}`;

  // ── stats panel ───────────────────────────────────────────────
  function buildStats() {
    const grid = document.getElementById('stats-grid');
    const maxCount = Math.max(...Object.values(messagesPerSender));
    const totalCount = Object.values(messagesPerSender).reduce((a,b)=>a+b,0);

    // compute busiest day
    const dayCount = {};
    messages.forEach(m => { dayCount[m.date] = (dayCount[m.date]||0)+1; });
    let busiestDay = '', busiestCount = 0;
    for (const [d,c] of Object.entries(dayCount)) {
      if (c > busiestCount) { busiestCount = c; busiestDay = d; }
    }

    // compute top emojis
    const emojiRx = /\p{Emoji_Presentation}|\p{Emoji}\uFE0F/gu;
    const emojiCount = {};
    messages.forEach(m => {
      const found = (m.text||'').match(emojiRx) || [];
      found.forEach(e => { emojiCount[e] = (emojiCount[e]||0)+1; });
    });
    const topEmojis = Object.entries(emojiCount).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([e])=>e).join(' ');

    grid.innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Total Messages</div>
        <div class="stat-value">${totalCount}</div>
        <div class="stat-sub">${dateRange}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Busiest Day</div>
        <div class="stat-value">${friendlyDate(busiestDay)}</div>
        <div class="stat-sub">${busiestCount} messages</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Media Shared</div>
        <div class="stat-value">${DATA.mediaCount || 0}</div>
        <div class="stat-sub">files & images</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Top Emojis</div>
        <div class="stat-value" style="font-size:20px">${topEmojis || '—'}</div>
      </div>
    `;

    const sendersEl = document.getElementById('stats-senders');
    let senderHtml = '';
    senders.forEach((s, i) => {
      const cnt = messagesPerSender[s] || 0;
      const pct = totalCount > 0 ? (cnt / totalCount * 100).toFixed(0) : 0;
      const cls = i === 0 ? 'stats-bar-alex' : 'stats-bar-mira';
      senderHtml += `
        <div class="stats-sender-row">
          <span class="stats-sender-name">${escHtml(s)}</span>
          <div class="stats-bar-wrap">
            <div class="stats-bar ${cls}" style="width:${pct}%"></div>
          </div>
          <span class="stats-count">${cnt}</span>
        </div>`;
    });
    sendersEl.innerHTML = senderHtml;
  }

  document.getElementById('stats-toggle').addEventListener('click', function() {
    const panel = document.getElementById('stats-panel');
    panel.classList.toggle('open');
    this.textContent = panel.classList.contains('open') ? '📊 Hide Stats' : '📊 Stats';
  });

  // ── filter chips ──────────────────────────────────────────────
  function buildChips() {
    const row = document.getElementById('filter-row');
    // remove existing chips
    row.querySelectorAll('.chip').forEach(c => c.remove());

    const spacer = row.querySelector('.chip-spacer');
    senders.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.dataset.sender = s;
      const dotColor = i === 0 ? 'var(--chip-active-alex)' : 'var(--chip-active-mira)';
      btn.innerHTML = `<span class="chip-dot" style="background:${dotColor}"></span>${escHtml(s)}`;
      updateChipState(btn, s);
      btn.addEventListener('click', () => {
        if (activeFilters.has(s)) {
          if (activeFilters.size > 1) activeFilters.delete(s);
        } else {
          activeFilters.add(s);
        }
        updateChipState(btn, s);
        applyFilters();
      });
      row.insertBefore(btn, spacer);
    });
  }

  function updateChipState(btn, s) {
    const i = senders.indexOf(s);
    if (activeFilters.has(s)) {
      btn.className = 'chip ' + (i === 0 ? 'active-alex' : 'active-mira');
    } else {
      btn.className = 'chip inactive';
    }
  }

  // ── render messages ───────────────────────────────────────────
  function buildMessages() {
    const area = document.getElementById('messages-area');
    // keep the no-results div
    const noResults = document.getElementById('no-results');
    area.innerHTML = '';
    area.appendChild(noResults);

    let lastDate = null;
    let lastSender = null;

    messages.forEach((msg, idx) => {
      // date divider
      if (msg.date !== lastDate) {
        const div = document.createElement('div');
        div.className = 'date-divider';
        div.dataset.date = msg.date;
        div.innerHTML = `<span class="date-divider-label">${friendlyDate(msg.date)}</span>`;
        area.appendChild(div);
        lastDate = msg.date;
        lastSender = null;
      }

      const isAlex = msg.sender === SENDER_A;
      const cls = senderClass(msg.sender);
      const consecutive = msg.sender === lastSender;

      const row = document.createElement('div');
      row.className = `msg-row ${cls}${consecutive ? ' consecutive' : ''}`;
      row.dataset.idx = idx;
      row.dataset.sender = msg.sender;

      let contentHtml;
      if (msg.isMedia) {
        contentHtml = `<div class="msg-media">📎 <span>Media / attachment</span></div>`;
      } else {
        contentHtml = `<div class="msg-text">${escHtml(msg.text || '')}</div>`;
      }

      const mdText = `**${msg.sender}** (${msg.time}): ${msg.text || '[media]'}`;

      row.innerHTML = `
        <div class="msg-bubble-wrap">
          <div class="msg-bubble" data-idx="${idx}">
            ${contentHtml}
            <div class="msg-meta">
              <span class="msg-time">${formatTime(msg.time)}</span>
            </div>
          </div>
          <button class="copy-btn" data-md="${escHtml(mdText)}" title="Copy as Markdown">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            Copy
          </button>
        </div>`;

      area.appendChild(row);
      lastSender = msg.sender;
    });

    // copy buttons
    area.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const text = btn.dataset.md;
        navigator.clipboard.writeText(text).then(() => {
          btn.classList.add('copied');
          btn.textContent = '✓ Copied';
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy`;
          }, 1500);
        });
      });
    });
  }

  // ── filter & search ───────────────────────────────────────────
  function applyFilters() {
    const area = document.getElementById('messages-area');
    const q = searchQuery.trim().toLowerCase();
    const rows = area.querySelectorAll('.msg-row');
    const dateDividers = area.querySelectorAll('.date-divider');

    searchResults = [];
    let visiblePerDate = {};

    rows.forEach(row => {
      const idx = parseInt(row.dataset.idx, 10);
      const msg = messages[idx];
      const senderVisible = activeFilters.has(msg.sender);
      const textMatch = !q || (msg.text||'').toLowerCase().includes(q) || msg.sender.toLowerCase().includes(q);
      const visible = senderVisible && textMatch;

      row.classList.toggle('msg-hidden', !visible);

      // rebuild text highlighting
      const textEl = row.querySelector('.msg-text');
      if (textEl) {
        if (q && visible && (msg.text||'').toLowerCase().includes(q)) {
          textEl.innerHTML = highlightText(msg.text || '', q);
          const bubble = row.querySelector('.msg-bubble');
          if (bubble) bubble.classList.add('highlighted');
          searchResults.push(idx);
        } else {
          textEl.innerHTML = escHtml(msg.text || '');
          const bubble = row.querySelector('.msg-bubble');
          if (bubble) bubble.classList.remove('highlighted');
        }
      }

      if (visible) {
        visiblePerDate[msg.date] = (visiblePerDate[msg.date] || 0) + 1;
      }
    });

    // show/hide date dividers based on whether they have visible messages
    dateDividers.forEach(div => {
      const date = div.dataset.date;
      div.style.display = visiblePerDate[date] ? '' : 'none';
    });

    // update search count
    const countEl = document.getElementById('search-count');
    if (q) {
      countEl.textContent = searchResults.length > 0 ? `${searchResults.length} result${searchResults.length>1?'s':''}` : 'No results';
    } else {
      countEl.textContent = '';
    }

    // no-results
    const noResults = document.getElementById('no-results');
    const anyVisible = Object.keys(visiblePerDate).length > 0;
    noResults.classList.toggle('visible', !anyVisible);
  }

  function highlightText(text, q) {
    const escaped = escHtml(text);
    const ql = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escaped.replace(new RegExp(ql.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'), m => `<mark>${m}</mark>`);
  }

  // ── search UI ─────────────────────────────────────────────────
  const searchToggle = document.getElementById('search-toggle-btn');
  const searchBar = document.getElementById('search-bar');
  const searchInput = document.getElementById('search-input');
  const searchClear = document.getElementById('search-clear');

  searchToggle.addEventListener('click', () => {
    searchBar.classList.toggle('open');
    if (searchBar.classList.contains('open')) {
      searchInput.focus();
    } else {
      clearSearch();
    }
  });

  searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value;
    applyFilters();
  });

  searchClear.addEventListener('click', () => {
    clearSearch();
    searchInput.focus();
  });

  function clearSearch() {
    searchQuery = '';
    searchInput.value = '';
    applyFilters();
  }

  // Keyboard shortcut
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
      e.preventDefault();
      searchBar.classList.add('open');
      searchInput.focus();
      searchInput.select();
    }
    if (e.key === 'Escape') {
      searchBar.classList.remove('open');
      clearSearch();
    }
  });

  // ── scroll to bottom button ───────────────────────────────────
  const messagesArea = document.getElementById('messages-area');
  const scrollBtn = document.getElementById('scroll-btn');

  messagesArea.addEventListener('scroll', () => {
    const atBottom = messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight < 80;
    scrollBtn.classList.toggle('visible', !atBottom);
  });

  scrollBtn.addEventListener('click', () => {
    messagesArea.scrollTo({ top: messagesArea.scrollHeight, behavior: 'smooth' });
  });

  // ── init ──────────────────────────────────────────────────────
  buildStats();
  buildChips();
  buildMessages();
  applyFilters();

  // scroll to bottom on load
  setTimeout(() => {
    messagesArea.scrollTop = messagesArea.scrollHeight;
  }, 50);
})();
</script>
</body>
</html>
